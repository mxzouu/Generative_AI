<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Tomil&amp;Mazou Capital">
  <defs>
    <linearGradient id="tm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#34c759"/>
    </linearGradient>
  </defs>
  <!-- badge arrondi (style app-icon) -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#tm-grad)"/>
  <!-- barres ascendantes = croissance du capital -->
  <g fill="#ffffff">
    <rect x="11" y="27" width="6.5" height="10" rx="2.2" opacity="0.7"/>
    <rect x="20.75" y="21" width="6.5" height="16" rx="2.2" opacity="0.85"/>
    <rect x="30.5" y="14" width="6.5" height="23" rx="2.2"/>
    <!-- point de sommet -->
    <circle cx="33.75" cy="10.5" r="2.7"/>
  </g>
</svg>
